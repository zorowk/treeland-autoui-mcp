syntax = "proto3";

package treeland.remote;

message Empty {}

message ScreenshotResponse {
  bytes png = 1;
  uint32 width = 2;
  uint32 height = 3;
}

message ClickRequest {
  int32 x = 1;
  int32 y = 2;
  string button = 3;
  int32 clicks = 4;
}

message DragRequest {
  int32 from_x = 1;
  int32 from_y = 2;
  int32 to_x = 3;
  int32 to_y = 4;
  string button = 5;
  string key = 6;
}

message TypeRequest {
  string text = 1;
  bool use_clipboard = 2;
}

message HotkeyRequest {
  repeated string keys = 1;
}

message ScrollRequest {
  int32 clicks = 1;
  string direction = 2; // up/down/left/right
}

message MoveRequest {
  int32 x = 1;
  int32 y = 2;
}

message KeysList {
  repeated string keys = 1;
}

message Ack {
  bool ok = 1;
  string message = 2;
}

service RemoteControl {
  rpc GetScreenshot(Empty) returns (ScreenshotResponse);
  rpc GetKeys(Empty) returns (KeysList);
  rpc Click(ClickRequest) returns (Ack);
  rpc Drag(DragRequest) returns (Ack);
  rpc Type(TypeRequest) returns (Ack);
  rpc Hotkey(HotkeyRequest) returns (Ack);
  rpc Scroll(ScrollRequest) returns (Ack);
  rpc Move(MoveRequest) returns (Ack);
}
